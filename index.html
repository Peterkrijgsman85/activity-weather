<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RideWeather Pro | Ultimate</title>
    <style>
        :root { --strava: #fc4c02; --dark: #2d2d2d; --gray: #f4f4f9; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--gray); color: var(--dark); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 500px; padding: 25px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); box-sizing: border-box; }
        
        h2 { color: var(--strava); text-align: center; margin: 0 0 20px 0; font-size: 1.6rem; }
        
        /* Activity Selector */
        .activity-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .act-btn { flex: 1; background: #eee; border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-size: 1.2rem; transition: 0.2s; border: 2px solid transparent; }
        .act-btn.active { background: #fffaf8; border-color: var(--strava); filter: grayscale(0); }
        .act-btn:not(.active) { filter: grayscale(1); opacity: 0.6; }

        .mode-selector { display: flex; background: #eee; border-radius: 12px; padding: 4px; margin-bottom: 20px; }
        .mode-btn { flex: 1; border: none; padding: 8px; border-radius: 9px; cursor: pointer; font-weight: bold; background: none; }
        .mode-btn.active { background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); color: var(--strava); }

        .vibe-container { margin: 20px 0; }
        .vibe-labels { display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: bold; color: #666; margin-bottom: 5px; }
        .slider { -webkit-appearance: none; width: 100%; height: 6px; border-radius: 5px; background: #ddd; outline: none; }
        .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: var(--strava); cursor: pointer; border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        .input-group { margin-bottom: 12px; }
        label { font-size: 0.7rem; font-weight: 700; color: #999; text-transform: uppercase; display: block; margin-bottom: 4px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 0.95rem; }
        
        .btn-generate { background: var(--strava); color: white; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: 10px; }
        
        .result-box { margin-top: 25px; border-top: 2px solid #f0f0f0; padding-top: 20px; display: none; }
        .variant { background: #fff; border: 2px solid #eee; padding: 15px; border-radius: 15px; margin-bottom: 12px; cursor: pointer; position: relative; }
        .variant:hover { border-color: var(--strava); }
        .variant-tag { position: absolute; top: -10px; left: 12px; background: var(--strava); color: white; font-size: 0.6rem; padding: 2px 8px; border-radius: 8px; font-weight: bold; }
        .copy-text { font-size: 0.95rem; line-height: 1.4; color: #333; display: block; }
    </style>
</head>
<body>

<div class="card">
    <h2>🚴 RideWeather Pro</h2>

    <label>Activiteit</label>
    <div class="activity-selector">
        <button class="act-btn active" onclick="setActivity('bike', this)">🚲 Fietsen</button>
        <button class="act-btn" onclick="setActivity('run', this)">🏃 Hardlopen</button>
    </div>

    <div class="mode-selector">
        <button class="mode-btn active" id="btnSingle" onclick="setMode('single')">Rondje</button>
        <button class="mode-btn" id="btnRoute" onclick="setMode('route')">A naar B</button>
    </div>

    <div class="vibe-container">
        <div class="vibe-labels"><span>🤓 NERD</span><span>AVONTURIER 🌪️</span></div>
        <input type="range" min="0" max="100" value="50" class="slider" id="vibeSlider">
    </div>

    <div class="input-group">
        <label id="labelA">Locatie / Start</label>
        <input type="text" id="locA" placeholder="GPS Zoeken...">
    </div>

    <div id="routeFields" style="display:none;" class="input-group">
        <label>Eindlocatie</label>
        <input type="text" id="locB" placeholder="Waar kom je aan?">
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="input-group"><label>Datum</label><input type="date" id="dateInput"></div>
        <div class="input-group"><label>Tijd</label><input type="time" id="timeInput"></div>
    </div>

    <button class="btn-generate" onclick="generate()">Genereer Beschrijving</button>

    <div id="resultArea" class="result-box">
        <div class="variant" onclick="copy(this)"><div class="variant-tag">DATA</div><span class="copy-text" id="res1"></span></div>
        <div class="variant" onclick="copy(this)"><div class="variant-tag">STORY</div><span class="copy-text" id="res2"></span></div>
    </div>
</div>

<script>
    let currentMode = 'single';
    let currentActivity = 'bike';

    // Init
    const nu = new Date();
    document.getElementById('dateInput').valueAsDate = nu;
    document.getElementById('timeInput').value = nu.getHours().toString().padStart(2, '0') + ":00";

    function setActivity(a, btn) {
        currentActivity = a;
        document.querySelectorAll('.act-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function setMode(m) {
        currentMode = m;
        document.getElementById('btnSingle').classList.toggle('active', m === 'single');
        document.getElementById('btnRoute').classList.toggle('active', m === 'route');
        document.getElementById('routeFields').style.display = m === 'route' ? 'block' : 'none';
    }

    // Help-functies voor variatie
    const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];

    function getNarrative(w, vibe, act, isRoute) {
        const isBike = act === 'bike';
        const windLevel = w.w > 20 ? 'hard' : (w.w > 10 ? 'medium' : 'low');
        const tempLevel = w.t > 20 ? 'hot' : (w.t < 10 ? 'cold' : 'perfect');

        if (vibe < 40) { // Nerd
            return `Analyse: ${w.t}°C actueel, voelt als ${w.f}°C. Luchtvochtigheid ${w.h}%. Wind ${w.w}km/u uit ${w.wd}.`;
        }

        const intro = isBike 
            ? pick(["Lekker op de pedalen!", "Mooi ritje hoor.", "De benen voelden goed.", "Heerlijk buiten gespeeld."])
            : pick(["Lekker loopje!", "De schoenen mochten weer naar buiten.", "Kilometers vreten.", "Frisse neus gehaald."]);

        const windZin = {
            low: isBike ? "nagenoeg windstil, heerlijk cruisen." : "geen zuchtje wind, ideaal voor de hartslag.",
            medium: isBike ? `een prima windje uit ${w.wd}.` : `lekker briesje uit ${w.wd}.`,
            hard: isBike ? `stevig stoempen tegen de ${w.wd} wind.` : `vechten tegen de elementen uit ${w.wd}.`
        };

        const tempZin = {
            hot: "Het was zweten geblazen vandaag! 🔥",
            cold: "Brrr, wel even de handschoentjes nodig. ❄️",
            perfect: "Het temperatuurtje was precies goed."
        };

        if (vibe > 75) { // Avonturier
            const hero = isBike
                ? pick(["Mijn cadans bleef strak ondanks de wind.", "De klimmetjes voelden zwaarder door de hitte.", "Echte heroïek in dit weer."])
                : pick(["Het asfalt was van mij vandaag.", "Elke stap was raak in deze kou.", "Mijn longen genoten van de frisse lucht."]);
            return `${intro} ${tempZin[tempLevel]} ${windZin[windLevel]} ${hero}`;
        }

        return `${intro} Het was ${w.t} graden met ${windZin[windLevel]}`;
    }

    async function generate() {
        const vibe = document.getElementById('vibeSlider').value;
        const locA = document.getElementById('locA').value || "Utrecht";
        const date = document.getElementById('dateInput').value;
        const hour = parseInt(document.getElementById('timeInput').value.split(':')[0]);

        try {
            const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${locA}&count=1`);
            const geoData = await geoRes.json();
            const lat = geoData.results[0].latitude;
            const lon = geoData.results[0].longitude;

            const isToday = new Date(date).toDateString() === new Date().toDateString();
            const weatherUrl = isToday ? "https://api.open-meteo.com/v1/forecast" : "https://archive-api.open-meteo.com/v1/archive";
            
            const res = await fetch(`${weatherUrl}?latitude=${lat}&longitude=${lon}&start_date=${date}&end_date=${date}&hourly=temperature_2m,apparent_temperature,wind_speed_10m,wind_direction_10m,relative_humidity_2m&timezone=auto`);
            const d = await res.json();
            
            const w = {
                t: Math.round(d.hourly.temperature_2m[hour]),
                f: Math.round(d.hourly.apparent_temperature[hour]),
                w: Math.round(d.hourly.wind_speed_10m[hour]),
                h: d.hourly.relative_humidity_2m[hour],
                wd: ['N','NO','O','ZO','Z','ZW','W','NW'][Math.round(d.hourly.wind_direction_10m[hour] / 45) % 8]
            };

            // Resultaten vullen
            document.getElementById('res1').innerText = `🌡️ ${w.t}°C | 💨 ${w.w}km/u ${w.wd} | 💧 ${w.h}% | #weather`;
            document.getElementById('res2').innerText = getNarrative(w, vibe, currentActivity, currentMode === 'route');
            document.getElementById('resultArea').style.display = 'block';
        } catch (e) { alert("Locatie niet gevonden!"); }
    }

    function copy(div) {
        navigator.clipboard.writeText(div.querySelector('.copy-text').innerText);
        div.style.background = "#fffaf8";
        setTimeout(() => div.style.background = "#fff", 500);
    }
</script>
</body>
</html>
