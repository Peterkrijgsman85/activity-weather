<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activiteit Weer Pro</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 20px auto; padding: 20px; background: #eef2f3; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: #fc4c02; margin-top: 0; }
        .row { display: flex; gap: 10px; margin-bottom: 15px; }
        .input-group { flex: 1; }
        label { display: block; font-size: 0.85em; margin-bottom: 5px; font-weight: bold; color: #444; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .loc-row { display: flex; gap: 5px; }
        button { cursor: pointer; border-radius: 8px; font-weight: bold; transition: 0.2s; }
        .btn-main { background: #fc4c02; color: white; border: none; padding: 12px; width: 100%; margin-top: 10px; }
        .btn-clear { background: #eee; border: 1px solid #ccc; padding: 0 15px; }
        .variant { background: #fff5f0; border: 1px solid #ffccbc; padding: 12px; border-radius: 8px; margin-top: 10px; cursor: pointer; }
        .variant:hover { border-color: #fc4c02; }
        small { color: #888; text-transform: uppercase; font-size: 0.7em; letter-spacing: 0.5px; }
        #status { font-size: 0.8em; color: #666; margin-top: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🌦️ Activiteit Weer</h2>
    
    <div class="row">
        <div class="input-group">
            <label>Datum</label>
            <input type="date" id="dateInput">
        </div>
        <div class="input-group">
            <label>Tijdstip</label>
            <input type="time" id="timeInput" value="12:00">
        </div>
    </div>

    <div class="input-group" style="margin-bottom: 15px;">
        <label>Locatie</label>
        <div class="loc-row">
            <input type="text" id="locationInput" placeholder="Zoek stad of gebruik GPS...">
            <button class="btn-clear" onclick="clearLocation()" title="Wis locatie">✕</button>
        </div>
        <div id="status">📍 Detecteren van locatie...</div>
    </div>

    <button class="btn-main" onclick="getWeather()">Haal specifiek weer op</button>

    <div id="result" style="display:none; margin-top: 20px;">
        <p style="font-size: 0.9em; font-weight: bold;">Klik om te kopiëren:</p>
        <div class="variant" onclick="copy(this)"><small>Klassiek</small><br><span id="v1"></span></div>
        <div class="variant" onclick="copy(this)"><small>Verhalend</small><br><span id="v2"></span></div>
        <div class="variant" onclick="copy(this)"><small>Data-only</small><br><span id="v3"></span></div>
    </div>
</div>

<script>
    const dateInput = document.getElementById('dateInput');
    const locInput = document.getElementById('locationInput');
    const status = document.getElementById('status');

    // 1. Automatisch datum op vandaag zetten
    dateInput.valueAsDate = new Date();

    // 2. Automatisch locatie bepalen bij opstarten
    window.onload = () => {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                pos => {
                    status.innerText = "📍 GPS Locatie actief";
                    // We slaan de coördinaten stiekem op in de dataset van de input
                    locInput.dataset.lat = pos.coords.latitude;
                    locInput.dataset.lon = pos.coords.longitude;
                },
                err => { status.innerText = "Voer handmatig een locatie in"; }
            );
        }
    };

    function clearLocation() {
        locInput.value = "";
        delete locInput.dataset.lat;
        delete locInput.dataset.lon;
        status.innerText = "Locatie gewist. Voer stad in.";
        locInput.focus();
    }

    async function getWeather() {
        const date = dateInput.value;
        const time = document.getElementById('timeInput').value;
        const hour = time.split(':')[0]; // Pak het uur
        let lat = locInput.dataset.lat;
        let lon = locInput.dataset.lon;
        let cityName = "deze plek";

        try {
            // Als de gebruiker zelf iets heeft getypt, negeer de GPS en zoek de stad
            if (locInput.value.trim() !== "") {
                const geo = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${locInput.value}&count=1`);
                const geoData = await geo.json();
                if (!geoData.results) throw new Error("Stad niet gevonden");
                lat = geoData.results[0].latitude;
                lon = geoData.results[0].longitude;
                cityName = geoData.results[0].name;
            }

            if (!lat || !lon) throw new Error("Geen locatie bekend");

            // Gebruik de Forecast API (voor vandaag) of Archive API (voor verleden)
            // Om het simpel te houden pakt de Archive API data tot gisteren.
            const isToday = new Date(date).toDateString() === new Date().toDateString();
            const baseUrl = isToday 
                ? `https://api.open-meteo.com/v1/forecast` 
                : `https://archive-api.open-meteo.com/v1/archive`;

            const res = await fetch(`${baseUrl}?latitude=${lat}&longitude=${lon}&start_date=${date}&end_date=${date}&hourly=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&timezone=auto`);
            const data = await res.json();

            // Pak de data van het specifieke uur
            const temp = Math.round(data.hourly.temperature_2m[hour]);
            const wind = Math.round(data.hourly.wind_speed_10m[hour]);
            const feels = Math.round(data.hourly.apparent_temperature[hour]);
            
            const v1 = `⛅ Weer in ${cityName} om ${time}: ${temp}°C (voelt als ${feels}°C). Wind: ${wind} km/u.`;
            const v2 = `Toen ik om ${time} in ${cityName} was, was het ${temp} graden. ${wind > 15 ? 'Best een fris windje!' : 'Heerlijk rustig weer.'} 🚲`;
            const v3 = `${cityName} | ${time}u | ${temp}°C | Wind: ${wind} km/u #outdoor`;

            document.getElementById('v1').innerText = v1;
            document.getElementById('v2').innerText = v2;
            document.getElementById('v3').innerText = v3;
            document.getElementById('result').style.display = 'block';

        } catch (e) {
            alert(e.message);
        }
    }

    function copy(div) {
        navigator.clipboard.writeText(div.querySelector('span').innerText);
        const originalColor = div.style.background;
        div.style.background = "#d4edda";
        setTimeout(() => div.style.background = originalColor, 500);
    }
</script>

</body>
</html>
