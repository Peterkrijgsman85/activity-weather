<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ActivityWeather Pro</title>
    <style>
        :root { --strava: #fc4c02; --dark: #2d2d2d; --gray: #f4f4f9; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--gray); color: var(--dark); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 480px; padding: 25px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); box-sizing: border-box; }
        
        .header { text-align: center; margin-bottom: 25px; }
        h1 { color: var(--strava); margin: 0; font-size: 1.6rem; letter-spacing: -1px; }
        .description { font-size: 0.85rem; color: #666; line-height: 1.4; margin-top: 8px; }

        .section-label { font-size: 0.7rem; font-weight: 800; color: #999; text-transform: uppercase; margin: 15px 0 8px 5px; display: block; }
        
        .switcher { display: flex; background: #eee; border-radius: 12px; padding: 4px; gap: 4px; margin-bottom: 15px; }
        .sw-btn { flex: 1; border: none; padding: 10px; border-radius: 9px; cursor: pointer; font-weight: bold; background: none; transition: 0.2s; font-size: 0.85rem; }
        .sw-btn.active { background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); color: var(--strava); }

        .input-group { margin-bottom: 10px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; font-size: 1rem; outline: none; }
        input:focus { border-color: var(--strava); }
        
        .btn-generate { background: var(--strava); color: white; border: none; padding: 16px; width: 100%; border-radius: 15px; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: 15px; transition: 0.2s; }
        .btn-generate:active { transform: scale(0.98); }
        .btn-generate:disabled { background: #ccc; cursor: not-allowed; }

        .result-box { margin-top: 25px; border-top: 2px solid #f0f0f0; padding-top: 20px; display: none; }
        .variant { background: #fff; border: 2px solid #eee; padding: 18px; border-radius: 15px; margin-bottom: 15px; cursor: pointer; position: relative; transition: 0.2s; }
        .variant:hover { border-color: var(--strava); background: #fffaf8; }
        .variant-tag { position: absolute; top: -10px; left: 15px; background: #eee; color: #666; font-size: 0.65rem; padding: 2px 10px; border-radius: 10px; font-weight: bold; }
        .copy-text { font-size: 1rem; line-height: 1.5; color: #222; display: block; }
        
        #loader { display: none; text-align: center; color: var(--strava); font-weight: bold; margin-top: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>ActivityWeather Pro 🛰️</h1>
        <p class="description">Genereer de perfecte weerbeschrijving voor je Strava of Komoot activiteit.</p>
    </div>

    <div class="switcher">
        <button class="sw-btn active" id="mS" onclick="setMode('single')">Rondje 🔄</button>
        <button class="sw-btn" id="mR" onclick="setMode('route')">A naar B 🏁</button>
    </div>

    <div class="input-group">
        <label class="section-label">Locatie / Start</label>
        <input type="text" id="locA" placeholder="Locatie bepalen... 📡">
    </div>

    <div id="routeFields" style="display:none;" class="input-group">
        <label class="section-label">Eindlocatie</label>
        <input type="text" id="locB" placeholder="Waar kom je aan? 📍">
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="input-group"><label class="section-label">Datum</label><input type="date" id="dateIn"></div>
        <div class="input-group"><label class="section-label">Tijd</label><input type="time" id="timeIn"></div>
    </div>

    <button class="btn-generate" id="genBtn" onclick="generate()">Genereer Bericht ✨</button>
    <div id="loader">Data ophalen uit de cloud... ☁️</div>

    <div id="resultArea" class="result-box">
        <div class="variant" onclick="copy(this)"><div class="variant-tag">KORT & KRACHTIG ⚡</div><span class="copy-text" id="res1"></span></div>
        <div class="variant" onclick="copy(this)"><div class="variant-tag">UITGEBREIDER 📝</div><span class="copy-text" id="res2"></span></div>
    </div>
</div>

<script>
    let mode = 'single';
    const locA = document.getElementById('locA');
    const genBtn = document.getElementById('genBtn');
    const loader = document.getElementById('loader');

    // Tijd en Datum goedzetten
    const nu = new Date();
    document.getElementById('dateIn').valueAsDate = nu;
    document.getElementById('timeIn').value = nu.getHours().toString().padStart(2, '0') + ":00";

    // Automatische Locatiebepaling
    window.onload = () => {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude, lon = pos.coords.longitude;
                locA.dataset.lat = lat; 
                locA.dataset.lon = lon;
                try {
                    const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                    const d = await r.json();
                    const name = d.address.city || d.address.town || d.address.village || d.address.suburb || "Mijn locatie";
                    locA.value = name;
                    locA.dataset.autoname = name;
                } catch (e) { 
                    locA.placeholder = "Locatie handmatig invullen...";
                }
            }, (err) => {
                locA.placeholder = "GPS geblokkeerd. Vul handmatig in.";
            }, { timeout: 8000 });
        } else {
            locA.placeholder = "Geen GPS ondersteuning.";
        }
    };

    function setMode(m) { 
        mode = m; 
        document.getElementById('mS').classList.toggle('active', m === 'single');
        document.getElementById('mR').classList.toggle('active', m === 'route');
        document.getElementById('routeFields').style.display = m === 'route' ? 'block' : 'none'; 
    }

    function getWeatherIcon(code) {
        if (code === 0) return "☀️";
        if (code <= 3) return "🌤️";
        if (code <= 48) return "🌫️";
        if (code <= 67) return "🌧️";
        if (code <= 82) return "🌦️";
        return "⛈️";
    }

    function getWindBft(kmh) {
        if (kmh < 1) return 0; if (kmh < 6) return 1; if (kmh < 12) return 2;
        if (kmh < 20) return 3; if (kmh < 29) return 4; if (kmh < 39) return 5;
        if (kmh < 50) return 6; if (kmh < 62) return 7; return 8;
    }

    function getWeatherDesc(code) {
        if (code === 0) return "onbewolkt";
        if (code <= 3) return "half bewolkt";
        if (code <= 48) return "mistig";
        if (code <= 67) return "regenachtig";
        if (code <= 82) return "buien";
        return "onweer";
    }

    function getTimeOfDay(timeString) {
        const hour = parseInt(timeString.split(':')[0]);
        if (hour < 12) return "ochtend";
        if (hour < 18) return "middag";
        return "avond";
    }

    async function fetchWeather(cityInput, isStart) {
        let lat, lon;
        // Gebruik opgeslagen GPS data als de naam overeenkomt
        if (isStart && locA.dataset.lat && cityInput === locA.dataset.autoname) {
            lat = locA.dataset.lat; lon = locA.dataset.lon;
        } else {
            const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cityInput)}&count=1`);
            const d = await r.json();
            if (!d.results) throw new Error(`Stad "${cityInput}" niet gevonden`);
            lat = d.results[0].latitude; lon = d.results[0].longitude;
        }

        const date = document.getElementById('dateIn').value;
        const hour = parseInt(document.getElementById('timeIn').value.split(':')[0]);
        const isToday = new Date(date).toDateString() === new Date().toDateString();
        
        const baseUrl = isToday ? "https://api.open-meteo.com/v1/forecast" : "https://archive-api.open-meteo.com/v1/archive";
        const res = await fetch(`${baseUrl}?latitude=${lat}&longitude=${lon}&start_date=${date}&end_date=${date}&hourly=temperature_2m,apparent_temperature,wind_speed_10m,wind_direction_10m,relative_humidity_2m,weather_code&timezone=auto`);
        const data = await res.json();

        return {
            t: Math.round(data.hourly.temperature_2m[hour]),
            f: Math.round(data.hourly.apparent_temperature[hour]),
            w: Math.round(data.hourly.wind_speed_10m[hour]),
            h: data.hourly.relative_humidity_2m[hour],
            c: data.hourly.weather_code[hour],
            wd: ['noorden','noordoosten','oosten','zuidoosten','zuiden','zuidwesten','westen','noordwesten'][Math.round(data.hourly.wind_direction_10m[hour] / 45) % 8],
            wdShort: ['N','NO','O','ZO','Z','ZW','W','NW'][Math.round(data.hourly.wind_direction_10m[hour] / 45) % 8]
        };
    }

    async function generate() {
        if (!locA.value) return alert("Vul eerst een locatie in!");
        genBtn.disabled = true; loader.style.display = 'block';
        document.getElementById('resultArea').style.display = 'none';

        try {
            const timeVal = document.getElementById('timeIn').value;
            const wA = await fetchWeather(locA.value, true);
            const icon = getWeatherIcon(wA.c);
            const desc = getWeatherDesc(wA.c);
            const dayPart = getTimeOfDay(timeVal);
            
            let res1, res2;

            if (mode === 'single') {
                res1 = `${icon} Weerupdate | 🌡️ ${wA.t}°C, ${desc}. 💨 Wind: ${wA.wdShort} ${wA.w} km/u. 💧 Luchtvochtigheid: ${wA.h}%.`;
                res2 = `✨ Weerupdate: Een ${wA.t < 11 ? 'frisse' : 'lekker'} ${dayPart}sessie bij ${wA.t}°C. ${wA.c < 3 ? 'Droog met af en toe een waterig zonnetje. ☀️' : 'Wisselende omstandigheden. ☁️'} 🌬️ Windkracht ${getWindBft(wA.w)} uit het ${wA.wd}.`;
            } else {
                const locBVal = document.getElementById('locB').value;
                if(!locBVal) throw new Error("Vul een eindlocatie in voor A naar B.");
                const wB = await fetchWeather(locBVal, false);
                res1 = `${icon} Weerupdate A ➔ B | 🌡️ ${wA.t}°C ➔ ${wB.t}°C. 💨 Wind: ${wB.wdShort} ${wB.w} km/u. 🌧️`;
                res2 = `📊 Weerupdate: Van ${wA.t}°C naar ${wB.t}°C tijdens deze ${dayPart}rit. 🌬️ Windkracht ${getWindBft(wB.w)} uit het ${wB.wd} bij de finish. 🏁`;
            }

            document.getElementById('res1').innerText = res1;
            document.getElementById('res2').innerText = res2;
            document.getElementById('resultArea').style.display = 'block';
        } catch (e) { 
            alert("Fout: " + e.message); 
        } finally { 
            genBtn.disabled = false; 
            loader.style.display = 'none'; 
        }
    }

    function copy(div) {
        navigator.clipboard.writeText(div.querySelector('.copy-text').innerText);
        const originalColor = div.style.borderColor;
        div.style.borderColor = "#fc4c02";
        div.style.background = "#fffaf8";
        setTimeout(() => { 
            div.style.borderColor = "#eee"; 
            div.style.background = "#fff";
        }, 800);
    }
</script>
</body>
</html>
